name: Update Issue Counts
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch issue counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node js/fetch-issues.js
      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add issues.json
          git commit -m "Update issue counts" || echo "No changes"
          git push